<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Landing Page</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
    scroll-behavior: smooth;
}
nav{
    position:fixed;
    top:0;
    width:100%;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:transparent;
    transition:all 0.4s ease;
    z-index:1000;
}
nav.scrolled{
    background:#111;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
    padding:12px 40px;
}
.logo{
    font-size:22px;
    font-weight:bold;
    color:white;
    animation: slideDown 1s ease;
}
nav ul{
    list-style:none;
    display:flex;
}
nav ul li{
    margin-left:30px;
}
nav ul li a{
    text-decoration:none;
    color:white;
    font-size:16px;
    position:relative;
    transition:0.3s;
}
nav ul li a::after{
    content:"";
    position:absolute;
    width:0%;
    height:2px;
    left:0;
    bottom:-5px;
    background:#00f2ff;
    transition:0.4s;
}
nav ul li a:hover{
    color:#00f2ff;
}
nav ul li a:hover::after{
    width:100%;
}
section{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    padding:100px 20px;
    opacity:0;
    transform:translateY(50px);
    transition:all 1s ease;
}
section.show{
    opacity:1;
    transform:translateY(0);
}

#home{ background:linear-gradient(to right,#141e30,#243b55);}
#about{ background:#1c1c1c;}
#services{ background:#333;}
#contact{ background:#444;}

h1{
    font-size:40px;
    animation: fadeIn 2s ease;
}
.btn{
    margin-top:20px;
    padding:10px 25px;
    border:none;
    background:#00f2ff;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    border-radius:30px;
    transition:0.4s;
}

.btn:hover{
    box-shadow:0 0 20px #00f2ff;
    transform:scale(1.1);
}
@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

@keyframes slideDown{
    from{transform:translateY(-50px); opacity:0;}
    to{transform:translateY(0); opacity:1;}
}
.menu-toggle{
    display:none;
    font-size:24px;
    color:white;
    cursor:pointer;
}

@media(max-width:768px){
    nav ul{
        position:absolute;
        top:60px;
        right:0;
        background:#111;
        flex-direction:column;
        width:200px;
        display:none;
        padding:10px 0;
    }

    nav ul.active{
        display:flex;
        animation:slideDown 0.5s ease;
    }

    nav ul li{
        margin:15px 0;
        text-align:center;
    }

    .menu-toggle{
        display:block;
    }
}
</style>
</head>

<body>

<nav id="navbar">
    <div class="logo">SkillCraft</div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <ul id="menu">
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#services">Services</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<section id="home">
    <div>
        <h1>Welcome to Our Landing Page</h1>
        <button class="btn">Explore</button>
    </div>
</section>

<section id="about">
    <h1>About Us</h1>
</section>

<section id="services">
    <h1>Our Services</h1>
</section>

<section id="contact">
    <h1>Contact Us</h1>
</section>

<script>
window.addEventListener("scroll", function(){
    const navbar = document.getElementById("navbar");
    navbar.classList.toggle("scrolled", window.scrollY > 50);
});
function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
}
const sections = document.querySelectorAll("section");

window.addEventListener("scroll", () => {
    sections.forEach(section => {
        const sectionTop = section.getBoundingClientRect().top;
        if(sectionTop < window.innerHeight - 100){
            section.classList.add("show");
        }
    });
});
</script>

</body>
</html>
